name: OpenWrt-7628
on:
  watch:
    types: started
  release:
    types: [published]
  workflow_dispatch:
jobs:
  build_openwrt:
    name: Build OpenWrt firmware
    runs-on: ubuntu-24.04
    if: github.event.repository.owner.id == github.event.sender.id
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          path: ./openwrt-ci
      - name: Space cleanup
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi $(docker images -q) || true
          sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /usr/local/lib/android
          sudo -E apt-get -y purge azure-cli ghc* zulu* hhvm llvm* firefox google* dotnet* powershell openjdk* mysql* php* mongodb* moby* snapd* || true
          sudo -E apt-get update
          sudo -E apt-get -y install build-essential asciidoc binutils bzip2 gawk gettext git libncurses-dev libz-dev patch python3 python3-setuptools unzip zlib1g-dev lib32gcc-s1 subversion flex gcc-multilib g++-multilib p7zip p7zip-full libssl-dev texinfo libglib2.0-dev xmlto qemu-utils upx libelf-dev autoconf automake libtool autopoint device-tree-compiler antlr3 gperf swig
          sudo npm install -g uglify-js || true
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          # sudo mkdir -p -m 777 /mnt/openwrt/bin /mnt/openwrt/build_dir/host /mnt/openwrt/build_dir/hostpkg /mnt/openwrt/dl /mnt/openwrt/feeds /mnt/openwrt/staging_dir
          # ln -s /mnt/openwrt/bin ./bin
          # mkdir -p ./build_dir
          # ln -s -f /mnt/openwrt/build_dir/host ./build_dir/host
          # ln -s -f /mnt/openwrt/build_dir/hostpkg ./build_dir/hostpkg
          # ln -s /mnt/openwrt/dl ./dl
          # ln -s /mnt/openwrt/feeds ./feeds
          # ln -s /mnt/openwrt/staging_dir ./staging_dir
          df -h
      - name: Download Source
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: v24.10.7
          path: ./openwrt
          
      - name: Update feeds
        run: |
          cd ./openwrt
          sed -i 's/git.openwrt.org\/feed/github.com\/openwrt/g' ./feeds.conf.default
          sed -i 's/git.openwrt.org\/project/github.com\/openwrt/g' ./feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          df -h
      - name: Generate configuration file
        run: |
          cd ./openwrt
          rm -f ./.config*
          touch ./.config
          git apply ../openwrt-ci/0001-WWDK7628.patch
          #
          # Configuration for WWDK M7628 (MT7628AN)
          # OpenWrt v24.10.7 - Embedded Device Control Router
          # No internet connectivity - Optimized for embedded control use
          cat >> .config <<EOF
          # Target Configuration
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt76x8=y
          CONFIG_TARGET_ramips_mt76x8_DEVICE_wwdk_m7628=y
          # LuCI Web Interface (Chinese) - 使用 luci-light 替代 luci 元包
          # 避免 luci 元包强制拉入 firewall、package-manager 等
          CONFIG_PACKAGE_luci-light=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-mod-network=y
          CONFIG_PACKAGE_luci-mod-system=y
          CONFIG_PACKAGE_luci-mod-status=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_LUCI_LANG_zh_Hans=y
          # Disable IPv6 (not needed for embedded control)
          CONFIG_IPV6=n
          CONFIG_KERNEL_IPV6=n
          # IPv6 隧道/过渡技术（彻底排除 DHCPv6 相关）
          CONFIG_PACKAGE_6in4=n
          CONFIG_PACKAGE_6rd=n
          CONFIG_PACKAGE_6to4=n
          CONFIG_PACKAGE_ds-lite=n
          CONFIG_PACKAGE_map=n
          # Disable firewall (embedded device, no internet)
          CONFIG_PACKAGE_firewall4=n
          CONFIG_PACKAGE_firewall=n
          CONFIG_PACKAGE_luci-app-firewall=n
          CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=n
          CONFIG_PACKAGE_kmod-ipt-core=n
          CONFIG_PACKAGE_kmod-ipt-conntrack=n
          CONFIG_PACKAGE_kmod-ipt-nat=n
          CONFIG_PACKAGE_kmod-nf-ipt=n
          CONFIG_PACKAGE_libip4tc=n
          CONFIG_PACKAGE_libip6tc=n
          CONFIG_PACKAGE_libiptext=n
          CONFIG_PACKAGE_libiptext6=n
          CONFIG_PACKAGE_libxtables=n
          CONFIG_PACKAGE_ufw=n
          # Disable PPP/WAN (not needed for embedded control)
          CONFIG_PACKAGE_ppp=n
          CONFIG_PACKAGE_ppp-mod-pppoe=n
          CONFIG_PACKAGE_odhcp6c=n
          CONFIG_PACKAGE_odhcpd-ipv6only=n
          CONFIG_PACKAGE_kmod-ppp=n
          CONFIG_PACKAGE_kmod-pppoe=n
          CONFIG_PACKAGE_kmod-pppox=n
          CONFIG_PACKAGE_luci-proto-ppp=n
          CONFIG_PACKAGE_luci-proto-ipv6=n
          CONFIG_PACKAGE_kmod-mppe=n
          # Disable unnecessary packages for speed
          CONFIG_PACKAGE_MAC80211_DEBUGFS=n
          CONFIG_PACKAGE_MAC80211_MESH=n
          CONFIG_PACKAGE_MAC80211_HWSIM=n
          CONFIG_USB_SUPPORT=n
          CONFIG_KERNEL_DEBUG_FS=n
          CONFIG_KERNEL_KALLSYMS=n
          CONFIG_KERNEL_DEBUG_INFO=n
          # Optimize for boot speed - remove unnecessary daemons
          CONFIG_PACKAGE_rpcd=y
          CONFIG_PACKAGE_rpcd-mod-file=y
          CONFIG_PACKAGE_rpcd-mod-luci=y
          CONFIG_PACKAGE_rpcd-mod-ucode=y
          CONFIG_PACKAGE_rpcd-mod-iwinfo=y
          CONFIG_PACKAGE_rpcd-mod-rrdns=n
          CONFIG_PACKAGE_uhttpd=y
          CONFIG_PACKAGE_uhttpd-mod-ubus=y
          CONFIG_PACKAGE_odhcpd=n
          CONFIG_PACKAGE_dnsmasq=n
          # ===== 积极方案 - 额外移除（保留 ethtool 与 netperf） =====
          # 文件系统工具
          CONFIG_PACKAGE_e2fsprogs=n
          CONFIG_PACKAGE_resize2fs=n
          CONFIG_PACKAGE_fdisk=n
          CONFIG_PACKAGE_parted=n
          # 系统调试工具
          CONFIG_PACKAGE_gdb=n
          CONFIG_PACKAGE_strace=n
          # 命令行工具
          CONFIG_PACKAGE_curl=n
          CONFIG_PACKAGE_less=n
          CONFIG_PACKAGE_file=n
          # 网络诊断工具（保留 ethtool、netperf；移除 tcpdump、iperf）
          CONFIG_PACKAGE_tcpdump=n
          CONFIG_PACKAGE_iperf=n
          # 版本控制与编辑器
          CONFIG_PACKAGE_git=n
          CONFIG_PACKAGE_subversion=n
          CONFIG_PACKAGE_mercurial=n
          CONFIG_PACKAGE_nano=n
          CONFIG_PACKAGE_vim=n
          CONFIG_PACKAGE_emacs=n
          # 内核调试/追踪
          CONFIG_KERNEL_SLUB_DEBUG=n
          CONFIG_KERNEL_KMEMLEAK=n
          CONFIG_KERNEL_FUNCTION_TRACER=n
          CONFIG_KERNEL_TRACEPOINTS=n
          # HTTP SSL (可移除以节省空间)
          CONFIG_PACKAGE_wget-ssl=n
          # 移除包管理器（嵌入式控制场景不需要在线装包）
          CONFIG_PACKAGE_luci-app-package-manager=n
          CONFIG_PACKAGE_luci-i18n-package-manager-zh-cn=n
          # ==========================================================
          # WiFi 驱动与核心组件 (MT7628AN -> MT7603E 2.4GHz)
          # ==========================================================
          CONFIG_PACKAGE_kmod-mt7603=y
          CONFIG_PACKAGE_kmod-mac80211=y
          CONFIG_PACKAGE_kmod-cfg80211=y
          CONFIG_PACKAGE_iw=y
          CONFIG_PACKAGE_iwinfo=y
          CONFIG_PACKAGE_wireless-tools=y
          CONFIG_PACKAGE_wireless-regdb=y
          CONFIG_PACKAGE_kmod-nls-base=y
          CONFIG_PACKAGE_wpad-basic-mbedtls=y
          # ==========================================================
          # 网络性能优化
          # ==========================================================
          CONFIG_KERNEL_NETDEVICES=y
          CONFIG_KERNEL_NET_CORE=y
          # 编译优化
          CONFIG_KERNEL_STRIP=y
          CONFIG_USE_STRIP=y
          # Build options
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_KERNEL_BUILD_USER="WWDK-CI"
          CONFIG_KERNEL_BUILD_DOMAIN="embedded.control"
          EOF
          #
          # ===============================================================
          # 
          sed -i 's/^[ \t]*//g' ./.config
          make defconfig
          # 检查：确认禁用列表中的包没有被依赖强制拉回
          echo "======================="
          echo "Checking forbidden packages..."
          echo "======================="
          FORBIDDEN_PKGS="firewall firewall4 luci-app-firewall luci-app-package-manager rpcd-mod-rrdns"
          FAILED=0
          for pkg in $FORBIDDEN_PKGS; do
            if grep -q "CONFIG_PACKAGE_${pkg}=y" .config; then
              echo "ERROR: CONFIG_PACKAGE_${pkg}=y still present after defconfig!"
              echo ""
              echo ">>> Who selects/depends on ${pkg}?"
              grep -rn "select.*PACKAGE_${pkg}\|\+${pkg}\|DEPENDS.*${pkg}" feeds/ package/ target/ --include="Config.in" --include="Makefile" 2>/dev/null | head -20 || true
              echo ""
              FAILED=1
            fi
          done
          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "One or more forbidden packages were forced back by 'select' dependencies."
            echo "Disable the upstream package shown above, or remove it from the config."
            exit 1
          fi
          echo "All forbidden packages confirmed absent. OK."
          echo "======================="
          echo "Full .config after defconfig:"
          echo "======================="
          cat .config
      - name: Make download
        run: |
          cd ./openwrt
          make download -j8 || make download -j1 V=s
          rm -rf $(find ./dl/ -size -1024c)
          df -h
      - name: Compile firmware
        run: |
          cd ./openwrt
          make -j$(nproc) || make -j1 V=s
          echo "======================="
          echo "Space usage:"
          echo "======================="
          df -h
          echo "======================="
          du -h ./ --max-depth=1
          du -h /mnt/openwrt/ --max-depth=1 || true
      - name: Prepare artifact
        run: |
          mkdir -p ./artifact/firmware
          mkdir -p ./artifact/package
          mkdir -p ./artifact/buildinfo
          rm -rf $(find ./openwrt/bin/targets/ -type d -name "packages")
          cp -rf $(find ./openwrt/bin/targets/ -type f) ./artifact/firmware/
          cp -rf $(find ./openwrt/bin/packages/ -type f -name "*.ipk") ./artifact/package/
          cp -rf $(find ./openwrt/bin/targets/ -type f -name "*.buildinfo" -o -name "*.manifest") ./artifact/buildinfo/
          cp -f ./openwrt/.config ./artifact/buildinfo/
      - name: Deliver buildinfo
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_buildinfo
          path: ./artifact/buildinfo/
      - name: Deliver package
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_package
          path: ./artifact/package/
      - name: Deliver firmware
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_firmware
          path: ./openwrt/bin/targets/
      - name: Upload release asset
        if: github.event == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.YOURTOKEN }}
          file: ./artifact/firmware/*
          tag: ${{ github.ref }}
          file_glob: true
